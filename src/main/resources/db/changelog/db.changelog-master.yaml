databaseChangeLog:
  - changeSet:
      id: 1
      author: sawfowl
      changes:
        - createTable:
            tableName: wallets
            columns:
              - column:
                  name: uuid
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: balance
                  type: BIGINT
